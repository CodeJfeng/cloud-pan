spring:
  application:
    name: cloud-drive-serve
  output:
    ansi:
      enabled: always
  mvc:
    servlet:
      load-on-startup: 1
  servlet:
    multipart:
      max-file-size: 3072MB
      max-request-size: 3072MB
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://127.0.0.1:3306/cloud_drive_pan?characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    database: 1
    host: 127.0.0.1
    password: 123456
  cloud:
    stream:
      RocketMQ:
        binder:
          name-server: localhost:9876
      bindings:
        # 生产者 send发送的第一个参数
        produceTest-out-0:
          destination: testTopic
        errorLog-out-0:
          destination: errorLog
        deleteFile-out-0:
          destination: deleteFile
        fileRestore-out-0:
          destination: fileRestore
        physicalDeleteFile-out-0:
          destination: physicalDeleteFile
        userSearch-out-0:
          destination: userSearch

        # 消费者 # 固定格式：函数名 + -in-0
        consumeTest-in-0:
          destination: testTopic
          group: testTopicGroup
        consumeErrorLog-in-0:
          destination: errorLog
          group: errorLogGroup
        consumeDeleteFile-in-0:
          destination: deleteFile
          group: deleteFileGroup
        consumeFileRestore-in-0:
          destination: fileRestore
          group: fileRestoreGroup
        consumerPhysicalDeleteFile-in-0:
          destination: physicalDeleteFile
          group: physicalDeleteFileGroup
        consumeUserSearch-in-0:
          destination: userSearch
          group: userSearchGroup

        # 2. 声明函数定义（告诉 Stream 哪些 Bean 是绑定目标）
      function:
          definition: consumeTest;consumeErrorLog;consumeDeleteFile;consumeFileRestore;consumeUserSearch;consumerPhysicalDeleteFile # # 多个用 ; 分隔，对应 @Bean 方法名

mybatis-plus:
  mapper-locations: classpath:/mappers/**/*.xml

server:
  port: 10000

management:
  endpoints:
    web:
      exposure:
        include: '*'
        exclude: env,beans

# SpringBoot 2.x 版本配置
# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    # 是否开启接口文档
    enabled: true
    # OpenAPI文档的路径
    path: /v3/api-docs
  swagger-ui:
    # swagger-ui路径
    path: /swagger-ui.html
    # 持久化认证数据
    persistAuthorization: true
  # 分组配置
  group-configs:
    - group: SpringDoc项目模块接口文档
      packages-to-scan: com.jfeng.pan



com:
  jfeng:
    pan:
      server:
        share-prefix: http://127.0.0.1:5173/share/
      bloom:
        filter:
          local:
            items:
              - name: SHARE_SIMPLE_DETAIL
                funnel-type-name: LONG
                expected-insertions: 5000000
                fpp: 0.01
      storage: 
        engine:
          rustfs: 
            endpoint: http://localhost:9000
            access-key-id: rustfsadmin
            access-key-secret: rustfsadmin
            bucket-name: cloud-pan
            auto-create-bucket: true
            presigned-url-expiration-seconds: 900
            public-endpoint: http://localhost:9000


